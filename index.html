<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IdleForge v0.2</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">IdleForge Demo</p>
        <h1>IdleForge v0.2</h1>
        <p class="subtitle">A small engine demo with two sample zones. Clear Floor 20 to finish the run.</p>
      </div>
      <div class="save-actions">
        <button id="exportSaveBtn" type="button">Export Save</button>
        <label class="import-label">
          <span>Import Save</span>
          <input id="importSaveInput" type="file" accept="application/json">
        </label>
        <button id="resetSaveBtn" type="button" class="danger">Reset Save</button>
      </div>
    </header>

    <section class="grid">
      <article class="panel stats-panel">
        <h2>Hero</h2>
        <div id="playerStats" class="stats"></div>
        <div class="progress">
          <div class="progress-label">
            <span>Zone</span>
            <span id="zoneText"></span>
          </div>
        </div>
        <div class="progress">
          <div class="progress-label">
            <span>XP</span>
            <span id="xpText"></span>
          </div>
          <div class="bar"><div id="xpBar" class="bar-fill"></div></div>
        </div>
        <div class="progress">
          <div class="progress-label">
            <span>Goal / Max Floor</span>
            <span id="floorText"></span>
          </div>
          <div class="bar"><div id="floorBar" class="bar-fill floor"></div></div>
        </div>
      </article>

      <article class="panel encounter-panel">
        <h2>Current Floor</h2>
        <div id="enemyPreview" class="preview-card"></div>
        <div class="combat-actions">
          <button id="fightBtn" type="button" class="primary">Fight</button>
        </div>
        <div id="combatLog" class="log" aria-live="polite"></div>
      </article>

      <article class="panel inventory-panel">
        <h2>Equipment</h2>
        <div id="equipmentSlots" class="equipment"></div>
        <h2>Inventory</h2>
        <div id="inventoryList" class="inventory"></div>
      </article>
    </section>
  </main>
  <footer class="app-footer">Edit js/content files to make a different game.</footer>

  <script src="js/content/game.config.js"></script>
  <script src="js/content/items.js"></script>
  <script src="js/content/enemies.js"></script>
  <script src="js/content/zones.js"></script>
  <script src="js/engine/state.js"></script>
  <script src="js/engine/save.js"></script>
  <script src="js/engine/loot.js"></script>
  <script src="js/engine/inventory.js"></script>
  <script src="js/engine/combat.js"></script>
  <script src="js/engine/render.js"></script>
</body>
</html>
